name: questfit_app
description: QuestFit — Level up your fitness with RPG-style quests and Samsung Watch integration.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Database (Drift / SQLite)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0

  # Health Connect (Phase 4)
  health: ^11.1.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.3.4

  # Notifications (Phase 4)
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Drift code generation
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/

